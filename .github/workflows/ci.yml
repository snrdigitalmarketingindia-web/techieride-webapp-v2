name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Shared environment ────────────────────────────────────────────────────────
env:
  NODE_ENV: development
  PORT: 3001
  DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  REDIS_PASSWORD: ""
  JWT_ACCESS_SECRET: ci_access_secret_min_32_chars_long
  JWT_REFRESH_SECRET: ci_refresh_secret_min_32_chars_long
  JWT_ACCESS_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 7d
  MINIO_ENDPOINT: localhost
  MINIO_PORT: 9000
  MINIO_USE_SSL: "false"
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET_DOCUMENTS: user-documents
  MINIO_BUCKET_PHOTOS: profile-photos
  SMS_PROVIDER: mock
  NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
  NEXT_PUBLIC_WS_URL: http://localhost:3001

jobs:

  # ── Stage 1: API Tests ──────────────────────────────────────────────────────
  api-tests:
    name: 🧪 API Tests (215 + Ratings/SOS P0)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techieride
          POSTGRES_PASSWORD: techieride
          POSTGRES_DB: techieride
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techieride"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:push -- --accept-data-loss
      - run: npm run db:seed

      - name: Create log directory
        run: mkdir -p /tmp/tr-logs

      - name: Start API server
        run: |
          npm run dev --workspace=apps/api > /tmp/tr-logs/api-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/v1 > /dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done

      - name: Run base API tests (37)
        id: test_base
        continue-on-error: true
        run: npm run test:api 2>&1 | tee /tmp/tr-logs/01-base.log
      - name: Run extended API tests (30)
        id: test_extended
        continue-on-error: true
        run: npm run test:api:extended 2>&1 | tee /tmp/tr-logs/02-extended.log
      - name: Run negative API tests (30)
        id: test_negative
        continue-on-error: true
        run: npm run test:api:negative 2>&1 | tee /tmp/tr-logs/03-negative.log
      - name: Run business rules tests
        id: test_rules
        continue-on-error: true
        run: npm run test:api:rules 2>&1 | tee /tmp/tr-logs/04-rules.log
      - name: Run production coverage tests
        id: test_coverage
        continue-on-error: true
        run: npm run test:api:coverage 2>&1 | tee /tmp/tr-logs/05-coverage.log
      - name: Run final gap-closing tests
        id: test_final
        continue-on-error: true
        run: npm run test:api:final 2>&1 | tee /tmp/tr-logs/06-final.log
      - name: Run ratings & SOS P0 tests
        id: test_ratings_sos
        continue-on-error: true
        run: npm run test:api:ratings-sos 2>&1 | tee /tmp/tr-logs/07-ratings-sos.log
      - name: Run notifications P0 tests
        id: test_notifications
        continue-on-error: true
        run: npm run test:api:notifications 2>&1 | tee /tmp/tr-logs/08-notifications.log
      - name: Run audit trail observable tests
        id: test_audit
        continue-on-error: true
        run: npm run test:api:audit-trail 2>&1 | tee /tmp/tr-logs/09-audit-trail.log
      - name: Run complaint system P0 tests
        id: test_complaints
        continue-on-error: true
        run: npm run test:api:complaints 2>&1 | tee /tmp/tr-logs/10-complaints.log

      - name: 📊 API test summary
        if: always()
        run: |
          echo "Suite results:"
          echo "  01-base         : ${{ steps.test_base.outcome }}"
          echo "  02-extended     : ${{ steps.test_extended.outcome }}"
          echo "  03-negative     : ${{ steps.test_negative.outcome }}"
          echo "  04-rules        : ${{ steps.test_rules.outcome }}"
          echo "  05-coverage     : ${{ steps.test_coverage.outcome }}"
          echo "  06-final        : ${{ steps.test_final.outcome }}"
          echo "  07-ratings-sos  : ${{ steps.test_ratings_sos.outcome }}"
          echo "  08-notifications: ${{ steps.test_notifications.outcome }}"
          echo "  09-audit-trail  : ${{ steps.test_audit.outcome }}"
          echo "  10-complaints   : ${{ steps.test_complaints.outcome }}"

          if [[ \
            "${{ steps.test_base.outcome }}"          != "success" || \
            "${{ steps.test_extended.outcome }}"      != "success" || \
            "${{ steps.test_negative.outcome }}"      != "success" || \
            "${{ steps.test_rules.outcome }}"         != "success" || \
            "${{ steps.test_coverage.outcome }}"      != "success" || \
            "${{ steps.test_final.outcome }}"         != "success" || \
            "${{ steps.test_ratings_sos.outcome }}"   != "success" || \
            "${{ steps.test_notifications.outcome }}" != "success" || \
            "${{ steps.test_audit.outcome }}"         != "success" || \
            "${{ steps.test_complaints.outcome }}"    != "success" \
          ]]; then
            echo ""
            echo "❌ One or more API test suites failed — see artifacts for details."
            exit 1
          fi
          echo ""
          echo "✅ All API test suites passed."

      - name: 📁 Upload test logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-logs
          path: /tmp/tr-logs/
          retention-days: 30

  # ── Stage 3: Security Tests ─────────────────────────────────────────────────
  security-tests:
    name: 🔐 Security Tests
    runs-on: ubuntu-latest
    needs: api-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techieride
          POSTGRES_PASSWORD: techieride
          POSTGRES_DB: techieride
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techieride"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:push -- --accept-data-loss
      - run: npm run db:seed

      - name: Create log directory
        run: mkdir -p /tmp/tr-logs

      - name: Start API server
        run: |
          npm run dev --workspace=apps/api > /tmp/tr-logs/api-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/v1 > /dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done

      - name: Run API security tests
        id: test_security
        continue-on-error: true
        run: npm run test:api:security 2>&1 | tee /tmp/tr-logs/security.log

      - name: 📊 Security test summary
        if: always()
        run: |
          echo "  security: ${{ steps.test_security.outcome }}"
          if [[ "${{ steps.test_security.outcome }}" != "success" ]]; then
            echo "❌ Security tests failed."
            exit 1
          fi
          echo "✅ Security tests passed."

      - name: 📁 Upload security logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-logs
          path: /tmp/tr-logs/
          retention-days: 30

  # ── Stage 4: E2E Tests (Playwright) ────────────────────────────────────────
  playwright-tests:
    name: 🎭 Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: api-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techieride
          POSTGRES_PASSWORD: techieride
          POSTGRES_DB: techieride
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techieride"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run db:generate
      - name: Push DB schema
        run: npm run db:push -- --accept-data-loss
        env:
          DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride
      - name: Seed database
        run: npm run db:seed
        env:
          DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride

      - name: Create log directory
        run: mkdir -p /tmp/tr-logs

      - name: Start API server
        run: |
          npm run dev --workspace=apps/api > /tmp/tr-logs/api-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/v1 > /dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done

      - name: Start web server
        run: |
          npm run dev --workspace=apps/web > /tmp/tr-logs/web-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "Web ready" && break
            sleep 2
          done

      - name: Run Playwright tests
        id: test_playwright
        continue-on-error: true
        run: npx playwright test --reporter=list,html

      - name: 📊 Playwright test summary
        if: always()
        run: |
          echo "  playwright: ${{ steps.test_playwright.outcome }}"
          if [[ "${{ steps.test_playwright.outcome }}" != "success" ]]; then
            echo "❌ Playwright tests failed."
            exit 1
          fi
          echo "✅ Playwright tests passed."

      - name: 📁 Upload Playwright report + server logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-logs
          path: |
            tests/e2e/report/
            test-results/
            /tmp/tr-logs/
          retention-days: 30

  # ── Stage 5: Quality Gate ───────────────────────────────────────────────────
  quality-gate:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    needs: [api-tests, security-tests, playwright-tests]
    if: always()
    steps:
      - name: Evaluate quality gate
        run: |
          echo "API Tests    : ${{ needs.api-tests.result }}"
          echo "Security     : ${{ needs.security-tests.result }}"
          echo "Playwright   : ${{ needs.playwright-tests.result }}"

          if [[ "${{ needs.api-tests.result }}"      != "success" ]] || \
             [[ "${{ needs.security-tests.result }}" != "success" ]] || \
             [[ "${{ needs.playwright-tests.result }}" != "success" ]]; then
            echo ""
            echo "❌ QUALITY GATE FAILED — one or more stages did not pass."
            exit 1
          fi

          echo ""
          echo "✅ All quality gates passed. Build is eligible for deployment."
