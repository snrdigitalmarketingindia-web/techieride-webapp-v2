name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# в”Җв”Җ Shared environment в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
env:
  NODE_ENV: development
  PORT: 3001
  DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  REDIS_PASSWORD: ""
  JWT_ACCESS_SECRET: ci_access_secret_min_32_chars_long
  JWT_REFRESH_SECRET: ci_refresh_secret_min_32_chars_long
  JWT_ACCESS_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 7d
  MINIO_ENDPOINT: localhost
  MINIO_PORT: 9000
  MINIO_USE_SSL: "false"
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET_DOCUMENTS: user-documents
  MINIO_BUCKET_PHOTOS: profile-photos
  SMS_PROVIDER: mock
  NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
  NEXT_PUBLIC_WS_URL: http://localhost:3001

jobs:

  # в”Җв”Җ Stage 1: API Tests в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  api-tests:
    name: рҹ§Ә API Tests (11 suites)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techieride
          POSTGRES_PASSWORD: techieride
          POSTGRES_DB: techieride
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techieride"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:push -- --accept-data-loss
      - run: npm run db:seed

      - name: Create log directory
        run: mkdir -p /tmp/tr-logs

      - name: Start API server
        run: |
          npm run dev --workspace=apps/api > /tmp/tr-logs/api-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/v1 > /dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done

      - name: Run base API tests (37)
        continue-on-error: true
        run: |
          npm run test:api 2>&1 | tee /tmp/tr-logs/01-base.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_01-base
      - name: Run extended API tests (30)
        continue-on-error: true
        run: |
          npm run test:api:extended 2>&1 | tee /tmp/tr-logs/02-extended.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_02-extended
      - name: Run negative API tests (30)
        continue-on-error: true
        run: |
          npm run test:api:negative 2>&1 | tee /tmp/tr-logs/03-negative.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_03-negative
      - name: Run business rules tests
        continue-on-error: true
        run: |
          npm run test:api:rules 2>&1 | tee /tmp/tr-logs/04-rules.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_04-rules
      - name: Run production coverage tests
        continue-on-error: true
        run: |
          npm run test:api:coverage 2>&1 | tee /tmp/tr-logs/05-coverage.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_05-coverage
      - name: Run final gap-closing tests
        continue-on-error: true
        run: |
          npm run test:api:final 2>&1 | tee /tmp/tr-logs/06-final.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_06-final
      - name: Run ratings & SOS P0 tests
        continue-on-error: true
        run: |
          npm run test:api:ratings-sos 2>&1 | tee /tmp/tr-logs/07-ratings-sos.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_07-ratings-sos
      - name: Run notifications P0 tests
        continue-on-error: true
        run: |
          npm run test:api:notifications 2>&1 | tee /tmp/tr-logs/08-notifications.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_08-notifications
      - name: Run audit trail observable tests
        continue-on-error: true
        run: |
          npm run test:api:audit-trail 2>&1 | tee /tmp/tr-logs/09-audit-trail.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_09-audit-trail
      - name: Run complaint system P0 tests
        continue-on-error: true
        run: |
          npm run test:api:complaints 2>&1 | tee /tmp/tr-logs/10-complaints.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_10-complaints
      - name: Run boarding state machine tests
        continue-on-error: true
        run: |
          npm run test:api:boarding 2>&1 | tee /tmp/tr-logs/11-boarding.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_11-boarding

      - name: рҹ“Ҡ API test summary
        if: always()
        run: |
          echo "Suite results:"
          for suite in 01-base 02-extended 03-negative 04-rules 05-coverage 06-final 07-ratings-sos 08-notifications 09-audit-trail 10-complaints 11-boarding; do
            if [ -f /tmp/tr-logs/FAILED_${suite} ]; then
              echo "  ${suite}: вқҢ FAILED"
            else
              echo "  ${suite}: вң… passed"
            fi
          done

          failed_count=$(ls /tmp/tr-logs/FAILED_* 2>/dev/null | wc -l)
          if [ "$failed_count" -gt 0 ]; then
            echo ""
            echo "вқҢ ${failed_count} suite(s) failed вҖ” see artifacts for details."
            exit 1
          fi
          echo ""
          echo "вң… All API test suites passed."

      - name: рҹ“қ Write failure summary to Job Summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          OUT=$GITHUB_STEP_SUMMARY   # renders inline on the Actions run page вҖ” no download needed
          FILE=/tmp/tr-logs/failure-summary.md  # also saved as standalone artifact

          write() { echo "$1" | tee -a "$FILE" >> "$OUT"; }

          write "# TechieRide CI вҖ” Test Summary"
          write ""
          write "> **Repo:** \`${{ github.repository }}\` В· **Branch:** \`${{ github.ref_name }}\` В· **Commit:** \`${{ github.sha }}\`"
          write "> **Run:** $RUN_URL В· **Triggered by:** ${{ github.actor }}"
          write ""
          write "## Suite Outcomes"
          write ""
          write "| Suite | Result |"
          write "|---|---|"
          write "| 01-base          | ${{ steps.test_base.outcome }} |"
          write "| 02-extended      | ${{ steps.test_extended.outcome }} |"
          write "| 03-negative      | ${{ steps.test_negative.outcome }} |"
          write "| 04-rules         | ${{ steps.test_rules.outcome }} |"
          write "| 05-coverage      | ${{ steps.test_coverage.outcome }} |"
          write "| 06-final         | ${{ steps.test_final.outcome }} |"
          write "| 07-ratings-sos   | ${{ steps.test_ratings_sos.outcome }} |"
          write "| 08-notifications | ${{ steps.test_notifications.outcome }} |"
          write "| 09-audit-trail   | ${{ steps.test_audit.outcome }} |"
          write "| 10-complaints    | ${{ steps.test_complaints.outcome }} |"
          write "| 11-boarding      | $([ -f /tmp/tr-logs/FAILED_11-boarding ] && echo 'вқҢ FAILED' || echo 'вң… passed') |"
          write ""
          write "## Failed Tests"
          write ""

          found=0
          for log in /tmp/tr-logs/0*.log /tmp/tr-logs/1*.log; do
            [ -f "$log" ] || continue
            suite=$(basename "$log" .log)
            marker="/tmp/tr-logs/FAILED_${suite}"

            # A suite is failed if its marker file exists OR if it has вқҢ FAIL lines
            fails=$(grep "вқҢ FAIL" "$log" 2>/dev/null || true)
            crashed=$([ -f "$marker" ] && [ -z "$fails" ] && echo "yes" || echo "")

            if [ -n "$fails" ] || [ -f "$marker" ]; then
              found=1
              write "### вқҢ $suite"
              write ""

              if [ -n "$crashed" ]; then
                # Suite crashed before printing any test results вҖ” show last 20 lines
                write "_Suite crashed or exited before tests ran. Last output:_"
                write ""
                write '```'
                tail -20 "$log" | tee -a "$FILE" >> "$OUT"
                write '```'
              else
                # Normal test failures вҖ” show вқҢ FAIL lines
                write '```'
                echo "$fails" | tee -a "$FILE" >> "$OUT"
                write '```'
                write ""
                results=$(grep -E "Passed:|Failed:|passed|failed" "$log" | tail -5 || true)
                if [ -n "$results" ]; then
                  write '```'
                  echo "$results" | tee -a "$FILE" >> "$OUT"
                  write '```'
                fi
              fi
              write ""
            fi
          done

          if [ $found -eq 0 ]; then
            write "вң… _No failures вҖ” all suites passed._"
          else
            write "---"
            write "_Paste \`failure-summary.md\` (from \`api-test-logs\` artifact) into Claude and say:_"
            write "> CI run failed. Here is the failure summary вҖ” please investigate and fix."
          fi

      - name: рҹ“Ғ Upload test logs + failure summary (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-logs
          path: /tmp/tr-logs/
          retention-days: 30

  # в”Җв”Җ Stage 3: Security Tests в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  security-tests:
    name: рҹ”җ Security Tests
    runs-on: ubuntu-latest
    needs: api-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techieride
          POSTGRES_PASSWORD: techieride
          POSTGRES_DB: techieride
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techieride"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:push -- --accept-data-loss
      - run: npm run db:seed

      - name: Create log directory
        run: mkdir -p /tmp/tr-logs

      - name: Start API server
        run: |
          npm run dev --workspace=apps/api > /tmp/tr-logs/api-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/v1 > /dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done

      - name: Run API security tests
        continue-on-error: true
        run: |
          npm run test:api:security 2>&1 | tee /tmp/tr-logs/security.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_security

      - name: рҹ“Ҡ Security test summary
        if: always()
        run: |
          if [ -f /tmp/tr-logs/FAILED_security ]; then
            echo "  security: вқҢ FAILED"
            echo "вқҢ Security tests failed."
            exit 1
          fi
          echo "  security: вң… passed"
          echo "вң… Security tests passed."

      - name: рҹ“қ Write security summary to Job Summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          OUT=$GITHUB_STEP_SUMMARY
          FILE=/tmp/tr-logs/failure-summary.md
          write() { echo "$1" | tee -a "$FILE" >> "$OUT"; }

          write "# TechieRide CI вҖ” Security Test Summary"
          write ""
          write "> **Repo:** \`${{ github.repository }}\` В· **Branch:** \`${{ github.ref_name }}\` В· **Commit:** \`${{ github.sha }}\`"
          write "> **Run:** $RUN_URL"
          write ""
          sec_result=$([ -f /tmp/tr-logs/FAILED_security ] && echo "вқҢ FAILED" || echo "вң… passed")
          write "| Suite | Result |"
          write "|---|---|"
          write "| security | ${sec_result} |"
          write ""
          write "## Failed Tests"
          write ""
          fails=$(grep "вқҢ FAIL" /tmp/tr-logs/security.log 2>/dev/null || true)
          if [ -n "$fails" ]; then
            write '```'
            echo "$fails" | tee -a "$FILE" >> "$OUT"
            write '```'
          else
            write "вң… _No failures вҖ” security suite passed._"
          fi

      - name: рҹ“Ғ Upload security logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-logs
          path: /tmp/tr-logs/
          retention-days: 30

  # в”Җв”Җ Stage 4: E2E Tests (Playwright) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  playwright-tests:
    name: рҹҺӯ Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: api-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techieride
          POSTGRES_PASSWORD: techieride
          POSTGRES_DB: techieride
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techieride"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run db:generate
      - name: Push DB schema
        run: npm run db:push -- --accept-data-loss
        env:
          DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride
      - name: Seed database
        run: npm run db:seed
        env:
          DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride

      - name: Create log directory
        run: mkdir -p /tmp/tr-logs

      - name: Start API server
        run: |
          npm run dev --workspace=apps/api > /tmp/tr-logs/api-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/v1 > /dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done

      - name: Start web server
        run: |
          npm run dev --workspace=apps/web > /tmp/tr-logs/web-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "Web ready" && break
            sleep 2
          done

      - name: Run Playwright tests
        continue-on-error: true
        run: |
          npx playwright test --reporter=list,html 2>&1 | tee /tmp/tr-logs/playwright.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_playwright

      - name: рҹ“қ Write Playwright summary to Job Summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          OUT=$GITHUB_STEP_SUMMARY
          FILE=/tmp/tr-logs/failure-summary.md
          write() { echo "$1" | tee -a "$FILE" >> "$OUT"; }

          write "# TechieRide CI вҖ” Playwright E2E Summary"
          write ""
          write "> **Repo:** \`${{ github.repository }}\` В· **Branch:** \`${{ github.ref_name }}\` В· **Commit:** \`${{ github.sha }}\`"
          write "> **Run:** $RUN_URL"
          write ""
          pw_result=$([ -f /tmp/tr-logs/FAILED_playwright ] && echo "вқҢ FAILED" || echo "вң… passed")
          write "| Suite | Result |"
          write "|---|---|"
          write "| Playwright E2E | ${pw_result} |"
          write ""

          # Playwright list reporter marks failures with ' x ' (with spaces) or 'FAILED'
          fails=$(grep -E "^\s+[0-9]+\) |FAILED|вңҳ| Г—" /tmp/tr-logs/playwright.log 2>/dev/null | head -50 || true)
          # Also grab the summary line e.g. "5 failed" / "78 passed"
          totals=$(grep -E "[0-9]+ (passed|failed|skipped)" /tmp/tr-logs/playwright.log | tail -3 || true)

          write "## Test Results"
          write ""
          if [ -n "$totals" ]; then
            write '```'
            echo "$totals" | tee -a "$FILE" >> "$OUT"
            write '```'
            write ""
          fi

          if [ -n "$fails" ]; then
            write "## Failed Tests"
            write ""
            write '```'
            echo "$fails" | tee -a "$FILE" >> "$OUT"
            write '```'
            write ""
            write "_See \`playwright-logs\` artifact for the full HTML report with screenshots._"
            write ""
            write "---"
            write "_Paste \`failure-summary.md\` into Claude and say:_"
            write "> CI run failed. Here is the failure summary вҖ” please investigate and fix."
          else
            write "вң… _No failures вҖ” all Playwright tests passed._"
          fi

          # Fail the job if playwright step failed
          if [ -f /tmp/tr-logs/FAILED_playwright ]; then
            echo "вқҢ Playwright tests failed."
            exit 1
          fi
          echo "вң… Playwright tests passed."

      - name: рҹ“Ғ Upload Playwright report + server logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-logs
          path: |
            tests/e2e/report/
            test-results/
            /tmp/tr-logs/
          retention-days: 30

  # в”Җв”Җ Stage 5: Quality Gate в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  quality-gate:
    name: вң… Quality Gate
    runs-on: ubuntu-latest
    needs: [api-tests, security-tests, playwright-tests]
    if: always()
    steps:
      - name: Evaluate quality gate
        run: |
          API="${{ needs.api-tests.result }}"
          SEC="${{ needs.security-tests.result }}"
          PW="${{ needs.playwright-tests.result }}"

          api_icon=$([ "$API" = "success" ] && echo "вң…" || echo "вқҢ")
          sec_icon=$([ "$SEC" = "success" ] && echo "вң…" || echo "вқҢ")
          pw_icon=$([ "$PW"  = "success" ] && echo "вң…" || echo "вқҢ")

          {
            echo "# TechieRide CI вҖ” Quality Gate"
            echo ""
            echo "| Stage | Result |"
            echo "|---|---|"
            echo "| $api_icon API Tests (10 suites) | $API |"
            echo "| $sec_icon Security Tests        | $SEC |"
            echo "| $pw_icon  Playwright E2E        | $PW  |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$API" != "success" || "$SEC" != "success" || "$PW" != "success" ]]; then
            echo "## вқҢ Quality Gate FAILED" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "One or more stages failed. Check each job's summary above for the list of failing tests." >> "$GITHUB_STEP_SUMMARY"
            echo "вқҢ QUALITY GATE FAILED вҖ” one or more stages did not pass."
            exit 1
          fi

          echo "## вң… Quality Gate PASSED" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All stages passed. Build is eligible for deployment." >> "$GITHUB_STEP_SUMMARY"
          echo "вң… All quality gates passed. Build is eligible for deployment."
