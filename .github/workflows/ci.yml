name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (67 tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techieride
          POSTGRES_PASSWORD: techieride
          POSTGRES_DB: techieride
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_ACCESS_SECRET: ci_access_secret_min_32_chars_long
      JWT_REFRESH_SECRET: ci_refresh_secret_min_32_chars_long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      MINIO_ENDPOINT: localhost
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_DOCUMENTS: user-documents
      MINIO_BUCKET_PHOTOS: profile-photos
      SMS_PROVIDER: mock
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_WS_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push DB schema
        run: npm run db:push -- --accept-data-loss

      - name: Seed database
        run: npm run db:seed

      - name: Start API server
        run: |
          npm run dev --workspace=apps/api > /tmp/techieride-api.log 2>&1 &
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/v1 > /dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done

      - name: Run base API tests (37)
        run: npm run test:api

      - name: Run extended API tests (30)
        run: npm run test:api:extended

      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: /tmp/techieride-api.log

  playwright-tests:
    name: Playwright E2E Tests (42 tests)
    runs-on: ubuntu-latest
    needs: api-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techieride
          POSTGRES_PASSWORD: techieride
          POSTGRES_DB: techieride
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_ACCESS_SECRET: ci_access_secret_min_32_chars_long
      JWT_REFRESH_SECRET: ci_refresh_secret_min_32_chars_long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      MINIO_ENDPOINT: localhost
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_DOCUMENTS: user-documents
      MINIO_BUCKET_PHOTOS: profile-photos
      SMS_PROVIDER: mock
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_WS_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push DB schema
        run: npm run db:push -- --accept-data-loss

      - name: Seed database
        run: npm run db:seed

      - name: Start API server
        run: |
          npm run dev --workspace=apps/api > /tmp/techieride-api.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/v1 > /dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done

      - name: Start web server
        run: |
          npm run dev --workspace=apps/web > /tmp/techieride-web.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "Web ready" && break
            sleep 2
          done

      - name: Run Playwright tests
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/e2e/report/
            test-results/

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            /tmp/techieride-api.log
            /tmp/techieride-web.log
