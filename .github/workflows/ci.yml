name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Shared environment ────────────────────────────────────────────────────────
env:
  NODE_ENV: development
  PORT: 3001
  DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  REDIS_PASSWORD: ""
  JWT_ACCESS_SECRET: ci_access_secret_min_32_chars_long
  JWT_REFRESH_SECRET: ci_refresh_secret_min_32_chars_long
  JWT_ACCESS_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 7d
  CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
  CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
  CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
  SMS_PROVIDER: mock
  REQUEST_RATE_LIMIT: "1000"
  NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
  NEXT_PUBLIC_WS_URL: http://localhost:3001
  SKIP_MX_CHECK: "true"
  # Feature flags — keep in sync with production defaults
  FEATURE_ATTENDANCE_TRACKING: "false"
  NEXT_PUBLIC_FEATURE_ATTENDANCE_TRACKING: "false"
  NEXT_PUBLIC_FEATURE_MAPS: "true"

jobs:

  # ── Stage 1: API Tests ──────────────────────────────────────────────────────
  api-tests:
    name: 🧪 API Tests (11 suites)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techieride
          POSTGRES_PASSWORD: techieride
          POSTGRES_DB: techieride
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techieride"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:push -- --accept-data-loss
      - run: npm run db:seed

      - name: Create log directory
        run: mkdir -p /tmp/tr-logs

      - name: Start API server
        run: |
          npm run dev --workspace=apps/api > /tmp/tr-logs/api-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/v1 > /dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done

      - name: Run base API tests (37)
        continue-on-error: true
        run: |
          npm run test:api 2>&1 | tee /tmp/tr-logs/01-base.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_01-base
      - name: Run extended API tests (30)
        continue-on-error: true
        run: |
          npm run test:api:extended 2>&1 | tee /tmp/tr-logs/02-extended.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_02-extended
      - name: Run negative API tests (30)
        continue-on-error: true
        run: |
          npm run test:api:negative 2>&1 | tee /tmp/tr-logs/03-negative.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_03-negative
      - name: Run business rules tests
        continue-on-error: true
        run: |
          npm run test:api:rules 2>&1 | tee /tmp/tr-logs/04-rules.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_04-rules
      - name: Run production coverage tests
        continue-on-error: true
        run: |
          npm run test:api:coverage 2>&1 | tee /tmp/tr-logs/05-coverage.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_05-coverage
      - name: Run final gap-closing tests Part A (sections 1-16)
        continue-on-error: true
        run: |
          npm run test:api:final-a 2>&1 | tee /tmp/tr-logs/06a-final.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_06a-final
      - name: Run final gap-closing tests Part B1 (sections 17-25)
        continue-on-error: true
        run: |
          npm run test:api:final-b1 2>&1 | tee /tmp/tr-logs/06b1-final.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_06b1-final
      - name: Run final gap-closing tests Part B2 (sections 26-33)
        continue-on-error: true
        run: |
          npm run test:api:final-b2 2>&1 | tee /tmp/tr-logs/06b2-final.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_06b2-final
      - name: Run ratings & SOS P0 tests
        continue-on-error: true
        run: |
          npm run test:api:ratings-sos 2>&1 | tee /tmp/tr-logs/07-ratings-sos.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_07-ratings-sos
      - name: Run notifications P0 tests
        continue-on-error: true
        run: |
          npm run test:api:notifications 2>&1 | tee /tmp/tr-logs/08-notifications.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_08-notifications
      - name: Run audit trail observable tests
        continue-on-error: true
        run: |
          npm run test:api:audit-trail 2>&1 | tee /tmp/tr-logs/09-audit-trail.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_09-audit-trail
      - name: Run complaint system P0 tests
        continue-on-error: true
        run: |
          npm run test:api:complaints 2>&1 | tee /tmp/tr-logs/10-complaints.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_10-complaints
      - name: Run boarding state machine tests
        continue-on-error: true
        run: |
          npm run test:api:boarding 2>&1 | tee /tmp/tr-logs/11-boarding.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_11-boarding

      - name: Run edge case & race condition tests
        continue-on-error: true
        run: |
          npm run test:api:edge-cases 2>&1 | tee /tmp/tr-logs/12-edge-cases.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_12-edge-cases

      - name: Run cancellation real-world scenario tests
        continue-on-error: true
        run: |
          npm run test:api:cancellation 2>&1 | tee /tmp/tr-logs/13-cancellation.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_13-cancellation

      - name: 📊 API test summary
        if: always()
        run: |
          echo "Suite results:"
          for suite in 01-base 02-extended 03-negative 04-rules 05-coverage 06a-final 06b1-final 06b2-final 07-ratings-sos 08-notifications 09-audit-trail 10-complaints 11-boarding 12-edge-cases 13-cancellation; do
            if [ -f /tmp/tr-logs/FAILED_${suite} ]; then
              echo "  ${suite}: ❌ FAILED"
            else
              echo "  ${suite}: ✅ passed"
            fi
          done

          failed_count=$(ls /tmp/tr-logs/FAILED_* 2>/dev/null | wc -l)
          if [ "$failed_count" -gt 0 ]; then
            echo ""
            echo "❌ ${failed_count} suite(s) failed — see artifacts for details."
            exit 1
          fi
          echo ""
          echo "✅ All API test suites passed."

      - name: 📝 Write failure summary to Job Summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          OUT=$GITHUB_STEP_SUMMARY   # renders inline on the Actions run page — no download needed
          FILE=/tmp/tr-logs/failure-summary.md  # also saved as standalone artifact

          write() { echo "$1" | tee -a "$FILE" >> "$OUT"; }

          write "# TechieRide CI — Test Summary"
          write ""
          write "> **Repo:** \`${{ github.repository }}\` · **Branch:** \`${{ github.ref_name }}\` · **Commit:** \`${{ github.sha }}\`"
          write "> **Run:** $RUN_URL · **Triggered by:** ${{ github.actor }}"
          write ""
          write "## Suite Outcomes"
          write ""
          write "| Suite | Result |"
          write "|---|---|"
          write "| 01-base          | $([ -f /tmp/tr-logs/FAILED_01-base ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 02-extended      | $([ -f /tmp/tr-logs/FAILED_02-extended ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 03-negative      | $([ -f /tmp/tr-logs/FAILED_03-negative ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 04-rules         | $([ -f /tmp/tr-logs/FAILED_04-rules ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 05-coverage      | $([ -f /tmp/tr-logs/FAILED_05-coverage ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 06a-final        | $([ -f /tmp/tr-logs/FAILED_06a-final ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 06b1-final       | $([ -f /tmp/tr-logs/FAILED_06b1-final ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 06b2-final       | $([ -f /tmp/tr-logs/FAILED_06b2-final ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 07-ratings-sos   | $([ -f /tmp/tr-logs/FAILED_07-ratings-sos ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 08-notifications | $([ -f /tmp/tr-logs/FAILED_08-notifications ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 09-audit-trail   | $([ -f /tmp/tr-logs/FAILED_09-audit-trail ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 10-complaints    | $([ -f /tmp/tr-logs/FAILED_10-complaints ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 11-boarding      | $([ -f /tmp/tr-logs/FAILED_11-boarding ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 12-edge-cases    | $([ -f /tmp/tr-logs/FAILED_12-edge-cases ] && echo '❌ FAILED' || echo '✅ passed') |"
          write "| 13-cancellation  | $([ -f /tmp/tr-logs/FAILED_13-cancellation ] && echo '❌ FAILED' || echo '✅ passed') |"
          write ""
          write "## Failed Tests"
          write ""

          found=0
          for log in /tmp/tr-logs/0*.log /tmp/tr-logs/1*.log; do
            [ -f "$log" ] || continue
            suite=$(basename "$log" .log)
            marker="/tmp/tr-logs/FAILED_${suite}"

            # A suite is failed if its marker file exists OR if it has ❌ FAIL lines
            fails=$(grep "❌ FAIL" "$log" 2>/dev/null || true)
            crashed=$([ -f "$marker" ] && [ -z "$fails" ] && echo "yes" || echo "")

            if [ -n "$fails" ] || [ -f "$marker" ]; then
              found=1
              write "### ❌ $suite"
              write ""

              if [ -n "$crashed" ]; then
                # Suite crashed before printing any test results — show last 20 lines
                write "_Suite crashed or exited before tests ran. Last output:_"
                write ""
                write '```'
                tail -20 "$log" | tee -a "$FILE" >> "$OUT"
                write '```'
              else
                # Normal test failures — show ❌ FAIL lines
                write '```'
                echo "$fails" | tee -a "$FILE" >> "$OUT"
                write '```'
                write ""
                results=$(grep -E "Passed:|Failed:|passed|failed" "$log" | tail -5 || true)
                if [ -n "$results" ]; then
                  write '```'
                  echo "$results" | tee -a "$FILE" >> "$OUT"
                  write '```'
                fi
              fi
              write ""
            fi
          done

          if [ $found -eq 0 ]; then
            write "✅ _No failures — all suites passed._"
          else
            write "---"
            write "_Paste \`failure-summary.md\` (from \`api-test-logs\` artifact) into Claude and say:_"
            write "> CI run failed. Here is the failure summary — please investigate and fix."
          fi

      - name: 📁 Upload test logs + failure summary (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-logs
          path: /tmp/tr-logs/
          retention-days: 30

  # ── Stage 3: Security Tests ─────────────────────────────────────────────────
  security-tests:
    name: 🔐 Security Tests
    runs-on: ubuntu-latest
    needs: api-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techieride
          POSTGRES_PASSWORD: techieride
          POSTGRES_DB: techieride
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techieride"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:push -- --accept-data-loss
      - run: npm run db:seed

      - name: Create log directory
        run: mkdir -p /tmp/tr-logs

      - name: Start API server
        run: |
          npm run dev --workspace=apps/api > /tmp/tr-logs/api-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/v1 > /dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done

      - name: Run API security tests
        continue-on-error: true
        run: |
          npm run test:api:security 2>&1 | tee /tmp/tr-logs/security.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_security

      - name: 📊 Security test summary
        if: always()
        run: |
          if [ -f /tmp/tr-logs/FAILED_security ]; then
            echo "  security: ❌ FAILED"
            echo "❌ Security tests failed."
            exit 1
          fi
          echo "  security: ✅ passed"
          echo "✅ Security tests passed."

      - name: 📝 Write security summary to Job Summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          OUT=$GITHUB_STEP_SUMMARY
          FILE=/tmp/tr-logs/failure-summary.md
          write() { echo "$1" | tee -a "$FILE" >> "$OUT"; }

          write "# TechieRide CI — Security Test Summary"
          write ""
          write "> **Repo:** \`${{ github.repository }}\` · **Branch:** \`${{ github.ref_name }}\` · **Commit:** \`${{ github.sha }}\`"
          write "> **Run:** $RUN_URL"
          write ""
          sec_result=$([ -f /tmp/tr-logs/FAILED_security ] && echo "❌ FAILED" || echo "✅ passed")
          write "| Suite | Result |"
          write "|---|---|"
          write "| security | ${sec_result} |"
          write ""
          write "## Failed Tests"
          write ""
          fails=$(grep "❌ FAIL" /tmp/tr-logs/security.log 2>/dev/null || true)
          if [ -n "$fails" ]; then
            write '```'
            echo "$fails" | tee -a "$FILE" >> "$OUT"
            write '```'
          else
            write "✅ _No failures — security suite passed._"
          fi

      - name: 📁 Upload security logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-logs
          path: /tmp/tr-logs/
          retention-days: 30

  # ── Stage 3b: Smoke Gate (fast-feedback before full E2E) ───────────────────
  # Runs the 12 high-risk spec files first. If ANY smoke test fails the full
  # Playwright suite is skipped immediately — saving ~15 min of wasted CI time.
  # Every spec in SMOKE_SPECS is a full file (not individual tests), so beforeAll
  # always fires and intra-file dependencies are fully satisfied.
  smoke-gate:
    name: ⚡ Smoke Gate (E2E fast feedback)
    runs-on: ubuntu-latest
    # No dependency on api-tests — smoke spins up its own runner (own DB, API, Web)
    # so it runs in parallel with api-tests for true fast feedback.

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techieride
          POSTGRES_PASSWORD: techieride
          POSTGRES_DB: techieride
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techieride"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run db:generate
      - name: Push DB schema
        run: npm run db:push -- --accept-data-loss
        env:
          DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride
      - name: Seed database
        run: npm run db:seed
        env:
          DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride

      - name: Create log directory
        run: mkdir -p /tmp/tr-logs

      - name: Start API server
        run: |
          npm run dev --workspace=apps/api > /tmp/tr-logs/api-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/v1 > /dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done

      - name: Start web server
        run: |
          npm run dev --workspace=apps/web > /tmp/tr-logs/web-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "Web ready" && break
            sleep 2
          done

      - name: ⚡ Run smoke E2E tests
        continue-on-error: true
        run: |
          npx playwright test --config=playwright.smoke.config.ts --reporter=list,html 2>&1 \
            | tee /tmp/tr-logs/smoke.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_smoke

      - name: 📝 Write smoke summary to Job Summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          OUT=$GITHUB_STEP_SUMMARY
          write() { echo "$1" >> "$OUT"; }

          write "# ⚡ Smoke Gate — E2E Fast Feedback"
          write ""
          write "> **Commit:** \`${{ github.sha }}\` · **Branch:** \`${{ github.ref_name }}\`"
          write "> **Run:** $RUN_URL"
          write ""
          smoke_result=$([ -f /tmp/tr-logs/FAILED_smoke ] && echo "❌ FAILED" || echo "✅ passed")
          write "| Suite | Result |"
          write "|---|---|"
          write "| Smoke E2E (12 spec files) | ${smoke_result} |"
          write ""

          totals=$(grep -E "[0-9]+ (passed|failed|skipped)" /tmp/tr-logs/smoke.log | tail -3 || true)
          if [ -n "$totals" ]; then
            write "## Totals"
            write '```'
            echo "$totals" >> "$OUT"
            write '```'
            write ""
          fi

          fails=$(grep -E "✘| ×" /tmp/tr-logs/smoke.log 2>/dev/null | head -30 || true)
          if [ -n "$fails" ]; then
            write "## ❌ Failed Tests (full E2E suite was SKIPPED)"
            write '```'
            echo "$fails" >> "$OUT"
            write '```'
            write ""
            write "> Fix these failures and push again — once smoke passes, the full suite will run."
          else
            write "## ✅ Smoke passed — full E2E suite will proceed"
          fi

          if [ -f /tmp/tr-logs/FAILED_smoke ]; then
            echo "❌ Smoke gate failed — full E2E suite will not run."
            exit 1
          fi
          echo "✅ Smoke gate passed."

      - name: 📁 Upload smoke report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-gate-report
          path: |
            tests/e2e/report-smoke/
            /tmp/tr-logs/smoke.log
          retention-days: 14

  # ── Stage 4: E2E Tests (Playwright) ────────────────────────────────────────
  playwright-tests:
    name: 🎭 Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: smoke-gate

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techieride
          POSTGRES_PASSWORD: techieride
          POSTGRES_DB: techieride
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techieride"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run db:generate
      - name: Push DB schema
        run: npm run db:push -- --accept-data-loss
        env:
          DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride
      - name: Seed database
        run: npm run db:seed
        env:
          DATABASE_URL: postgresql://techieride:techieride@localhost:5432/techieride

      - name: Create log directory
        run: mkdir -p /tmp/tr-logs

      - name: Start API server
        run: |
          npm run dev --workspace=apps/api > /tmp/tr-logs/api-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/v1 > /dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done

      - name: Start web server
        run: |
          npm run dev --workspace=apps/web > /tmp/tr-logs/web-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "Web ready" && break
            sleep 2
          done

      - name: Run Playwright tests
        continue-on-error: true
        run: |
          npx playwright test --reporter=list,html 2>&1 | tee /tmp/tr-logs/playwright.log
          [ ${PIPESTATUS[0]} -eq 0 ] || touch /tmp/tr-logs/FAILED_playwright

      - name: 📝 Write Playwright summary to Job Summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          OUT=$GITHUB_STEP_SUMMARY
          FILE=/tmp/tr-logs/failure-summary.md
          write() { echo "$1" | tee -a "$FILE" >> "$OUT"; }

          write "# TechieRide CI — Playwright E2E Summary"
          write ""
          write "> **Repo:** \`${{ github.repository }}\` · **Branch:** \`${{ github.ref_name }}\` · **Commit:** \`${{ github.sha }}\`"
          write "> **Run:** $RUN_URL"
          write ""
          pw_result=$([ -f /tmp/tr-logs/FAILED_playwright ] && echo "❌ FAILED" || echo "✅ passed")
          write "| Suite | Result |"
          write "|---|---|"
          write "| Playwright E2E | ${pw_result} |"
          write ""

          # Playwright list reporter marks failures with ' x ' (with spaces) or 'FAILED'
          fails=$(grep -E "^\s+[0-9]+\) |FAILED|✘| ×" /tmp/tr-logs/playwright.log 2>/dev/null | head -50 || true)
          # Also grab the summary line e.g. "5 failed" / "78 passed"
          totals=$(grep -E "[0-9]+ (passed|failed|skipped)" /tmp/tr-logs/playwright.log | tail -3 || true)

          write "## Test Results"
          write ""
          if [ -n "$totals" ]; then
            write '```'
            echo "$totals" | tee -a "$FILE" >> "$OUT"
            write '```'
            write ""
          fi

          if [ -n "$fails" ]; then
            write "## Failed Tests"
            write ""
            write '```'
            echo "$fails" | tee -a "$FILE" >> "$OUT"
            write '```'
            write ""
            write "_See \`playwright-logs\` artifact for the full HTML report with screenshots._"
            write ""
            write "---"
            write "_Paste \`failure-summary.md\` into Claude and say:_"
            write "> CI run failed. Here is the failure summary — please investigate and fix."
          else
            write "✅ _No failures — all Playwright tests passed._"
          fi

          # Fail the job if playwright step failed
          if [ -f /tmp/tr-logs/FAILED_playwright ]; then
            echo "❌ Playwright tests failed."
            exit 1
          fi
          echo "✅ Playwright tests passed."

      - name: 📁 Upload Playwright report + server logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-logs
          path: |
            tests/e2e/report/
            test-results/
            /tmp/tr-logs/
          retention-days: 30

  # ── Stage 5: Quality Gate ───────────────────────────────────────────────────
  quality-gate:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    needs: [api-tests, security-tests, smoke-gate, playwright-tests]
    if: always()
    steps:
      - name: Evaluate quality gate
        run: |
          API="${{ needs.api-tests.result }}"
          SEC="${{ needs.security-tests.result }}"
          SMK="${{ needs.smoke-gate.result }}"
          PW="${{ needs.playwright-tests.result }}"

          api_icon=$([ "$API" = "success" ] && echo "✅" || echo "❌")
          sec_icon=$([ "$SEC" = "success" ] && echo "✅" || echo "❌")
          smk_icon=$([ "$SMK" = "success" ] && echo "✅" || ([ "$SMK" = "skipped" ] && echo "⏭️" || echo "❌"))
          pw_icon=$([ "$PW"  = "success" ] && echo "✅" || ([ "$PW"  = "skipped" ] && echo "⏭️" || echo "❌"))

          {
            echo "# TechieRide CI — Quality Gate"
            echo ""
            echo "| Stage | Result |"
            echo "|---|---|"
            echo "| $api_icon API Tests (13 suites)  | $API |"
            echo "| $sec_icon Security Tests          | $SEC |"
            echo "| $smk_icon Smoke Gate (12 specs)   | $SMK |"
            echo "| $pw_icon  Playwright E2E (full)   | $PW  |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$API" != "success" || "$SEC" != "success" || "$SMK" != "success" || "$PW" != "success" ]]; then
            echo "## ❌ Quality Gate FAILED" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "One or more stages failed. Check each job's summary above for the list of failing tests." >> "$GITHUB_STEP_SUMMARY"
            echo "❌ QUALITY GATE FAILED — one or more stages did not pass."
            exit 1
          fi

          echo "## ✅ Quality Gate PASSED" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All stages passed. Build is eligible for deployment." >> "$GITHUB_STEP_SUMMARY"
          echo "✅ All quality gates passed. Build is eligible for deployment."

  # ── Stage 6: Version bump (only after a fully green run on main) ────────────
  # Replaces the standalone "Bump Build Version" workflow so each push shows a
  # single CI run, and red builds never get a version bump.
  bump-version:
    name: 🔖 Bump Build Version
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.quality-gate.result == 'success' &&
      !contains(github.event.head_commit.message, '[skip version]')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for accurate commit count
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: ver
        run: |
          # Single source of truth: the [vN] prefix the commit hook stamped.
          # This keeps package.json identical to what the app footer and
          # /health display for this commit (a pre-push rebase over the bump
          # commit shifts the raw count by one, so recounting here drifts).
          MSG=$(git log -1 --format=%s)
          VERSION=$(echo "$MSG" | sed -n 's/^\[v\([0-9.]*\)\].*/\1/p')
          if [ -z "$VERSION" ]; then
            VERSION="2.1.0.$(git rev-list --count HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.ver.outputs.version }}"

          # Conflict-proof: two runs' bump jobs can race (both edit the same
          # version line, rebase conflicts). Rebuild the edit on top of fresh
          # origin/main each attempt instead of rebasing our commit over it.
          for attempt in 1 2 3; do
            git fetch origin main
            git checkout -B main origin/main

            # Superseded? If origin HEAD carries a newer [vN] prefix than ours,
            # the newer run's bump is authoritative — skip quietly.
            HEAD_PREFIX=$(git log -1 --format=%s | sed -n 's/^\[v2\.1\.0\.\([0-9]*\)\].*/\1/p')
            OURS=$(echo "$VERSION" | sed 's/.*\.//')
            if [ -n "$HEAD_PREFIX" ] && [ "$HEAD_PREFIX" -gt "$OURS" ]; then
              echo "⏭️ Superseded by v2.1.0.$HEAD_PREFIX on main — skipping bump"
              echo "⏭️ Bump skipped (superseded by v2.1.0.$HEAD_PREFIX)" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              if (pkg.version === '$VERSION') process.exit(0);
              pkg.version = '$VERSION';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            git add package.json
            if git diff --cached --quiet; then
              echo "Version already $VERSION — nothing to do"
              exit 0
            fi
            git commit -m "chore: bump version to $VERSION [skip version] [vercel skip]"
            if git push origin main; then
              echo "🔖 Bumped to $VERSION" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Push rejected (race) — retrying ($attempt/3)"
            sleep $((attempt * 5))
          done
          echo "❌ Could not push version bump after 3 attempts"
          exit 1
