name: Release Notes

on:
  push:
    branches: [main]

jobs:
  update-notes:
    # Skip if the commit itself is a release-notes update (avoid infinite loop)
    if: "!contains(github.event.head_commit.message, '[release-notes]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git rev-list --count is accurate

      - name: Generate and prepend changelog entry
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          MSG="${{ github.event.head_commit.message }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          BUILD=$(git rev-list --count HEAD)

          # Collect changed files (top 20)
          CHANGED=$(git diff-tree --no-commit-id -r --name-only "$SHA" | head -20 | sed 's/^/- /')

          # Write entry to temp file (avoids ** YAML parsing issues in multiline strings)
          {
            printf '## Build %s · %s · %s\n\n' "$BUILD" "$SHORT_SHA" "$DATE"
            printf 'Commit: %s\n' "$MSG"
            printf 'Author: %s\n\n' "$AUTHOR"
            printf 'Files changed:\n%s\n\n---\n\n' "$CHANGED"
          } > /tmp/entry.md

          # Prepend after the header block (line 4 = first blank line after header)
          HEAD=$(head -4 RELEASE_NOTES.md)
          TAIL=$(tail -n +5 RELEASE_NOTES.md)
          printf '%s\n' "$HEAD" > RELEASE_NOTES.md
          cat /tmp/entry.md >> RELEASE_NOTES.md
          printf '%s\n' "$TAIL" >> RELEASE_NOTES.md

      - name: Stamp build number into package.json
        run: |
          BUILD=$(git rev-list --count HEAD)
          # Update version field: keep major.minor.patch, replace/add build suffix
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const base = pkg.version.split('.').slice(0, 3).join('.');
            pkg.version = base + '.' + $BUILD;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Version stamped:', pkg.version);
          "

      - name: Commit updated notes and version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RELEASE_NOTES.md package.json
          git diff --cached --quiet || git commit -m "docs: release notes + version bump for build $(git rev-list --count HEAD) [release-notes]"
          git push
