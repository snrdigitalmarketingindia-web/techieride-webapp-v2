name: 🔍 Deploy Verify
run-name: "🔍 Deploy Verify · ${{ github.event.head_commit.message || github.sha }}"

# Verifies that Render (API) and Vercel (frontend) actually picked up the
# pushed commit. Polls the live /health and /api/version endpoints for up to
# ~12 minutes. On mismatch or timeout, the workflow fails and emails a report
# via Resend. Manual runs are also supported.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  API_URL: https://techieride-webapp-v2.onrender.com
  WEB_URL: https://techieride-webapp-v2-web.vercel.app

jobs:
  verify:
    name: Verify Render + Vercel picked up this commit
    runs-on: ubuntu-latest
    # Version-bump commits are tagged [vercel skip] — Vercel intentionally
    # doesn't deploy them, so verifying would always fail.
    if: ${{ !contains(github.event.head_commit.message, '[vercel skip]') }}
    steps:
      - name: Checkout (for commit ancestry checks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Render build status (early failure detection)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          # secrets aren't usable in `if:` — skip inside the script instead
          if [ -z "$RENDER_API_KEY" ]; then
            echo "RENDER_API_KEY not set — skipping early build detection"
            exit 0
          fi
          # Poll the Render API for the deploy of THIS commit; fail fast on build errors
          SID="${RENDER_SERVICE_ID:-srv-d8e3g7jbc2fs73c7la50}"
          if [ -z "$SID" ]; then
            SID=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY"               "https://api.render.com/v1/services?name=techieride-webapp-v2&limit=5" | jq -r '.[0].service.id // empty')
          fi
          [ -z "$SID" ] && { echo "⚠️ Could not resolve Render service id — skipping"; exit 0; }
          # Render free tier deploys take 20-30 min — wait up to 30
          for i in $(seq 1 60); do
            ROW=$(curl -sf -H "Authorization: Bearer $RENDER_API_KEY"               "https://api.render.com/v1/services/$SID/deploys?limit=10"               | jq -r --arg sha "${{ github.sha }}" '.[].deploy | select(.commit.id == $sha) | .status' | head -1)
            echo "attempt $i/60 — render deploy status for ${GITHUB_SHA:0:7}: ${ROW:-not started yet}"
            case "$ROW" in
              live) echo "✅ Render deploy is live"; exit 0 ;;
              *failed*|canceled|deactivated) echo "❌ Render build failed: $ROW"; exit 1 ;;
            esac
            sleep 30
          done
          echo "⏳ Render deploy still building after 30 min — endpoint check below will verify"

      - name: Wait for deploys and compare commits
        id: check
        run: |
          EXPECTED="${{ github.sha }}"
          # Build number stamped in this commit's package.json (2.1.0.{build}) —
          # the single number shown in the app footer, header and here.
          EXPECTED_VERSION=$(curl -sf "https://raw.githubusercontent.com/${{ github.repository }}/$EXPECTED/package.json" | jq -r '.version // "unknown"')
          echo "Expecting commit $EXPECTED (v$EXPECTED_VERSION)"

          API_OK=false
          WEB_OK=false
          API_SEEN="never reached"; API_VER="—"
          WEB_SEEN="never reached"; WEB_VER="—"

          # 60 attempts x 30s = up to 30 minutes — Render free tier is slow
          for i in $(seq 1 60); do
            # A live commit that CONTAINS the expected one means a newer push
            # superseded this run — that's healthy, count it as a match.
            is_current_or_newer () {
              [ "$1" = "$EXPECTED" ] && return 0
              git cat-file -e "$1" 2>/dev/null && git merge-base --is-ancestor "$EXPECTED" "$1" 2>/dev/null
            }
            if [ "$API_OK" != "true" ]; then
              RESP=$(curl -sf --max-time 20 "$API_URL/health" || echo '{}')
              API_SEEN=$(echo "$RESP" | jq -r '.commit // "unreachable"')
              API_VER=$(echo "$RESP" | jq -r '.version // "—"')
              is_current_or_newer "$API_SEEN" && API_OK=true
            fi
            if [ "$WEB_OK" != "true" ]; then
              RESP=$(curl -sf --max-time 20 "$WEB_URL/api/version" || echo '{}')
              WEB_SEEN=$(echo "$RESP" | jq -r '.commit // "unreachable"')
              WEB_VER=$(echo "$RESP" | jq -r '.version // "—"')
              is_current_or_newer "$WEB_SEEN" && WEB_OK=true
            fi
            echo "attempt $i/60 — render: $API_SEEN (v$API_VER) | vercel: $WEB_SEEN (v$WEB_VER)"
            [ "$API_OK" = "true" ] && [ "$WEB_OK" = "true" ] && break
            sleep 30
          done

          {
            echo "expected=$EXPECTED"
            echo "expected_version=$EXPECTED_VERSION"
            echo "api_ok=$API_OK"
            echo "web_ok=$WEB_OK"
            echo "api_seen=$API_SEEN"
            echo "web_seen=$WEB_SEEN"
            echo "api_version=$API_VER"
            echo "web_version=$WEB_VER"
          } >> "$GITHUB_OUTPUT"

          echo "## 🔍 Deploy Verification — v$EXPECTED_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Expected:** \`${EXPECTED:0:7}\` · **v$EXPECTED_VERSION**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | Live commit | Live version | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Render API | \`${API_SEEN:0:7}\` | v$API_VER | $([ "$API_OK" = true ] && echo ✅ || echo ❌) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Vercel Web | \`${WEB_SEEN:0:7}\` | v$WEB_VER | $([ "$WEB_OK" = true ] && echo ✅ || echo ❌) |" >> "$GITHUB_STEP_SUMMARY"

          if [ "$API_OK" != "true" ] || [ "$WEB_OK" != "true" ]; then
            echo "❌ Deploy verification failed"
            exit 1
          fi
          echo "✅ Both deploys match $EXPECTED (v$EXPECTED_VERSION)"

      - name: Email failure report (Resend)
        if: failure()
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg from "TechieRide CI <noreply@techieride.in>" \
              --arg to "${{ secrets.CONTACTS_EMAIL || 'snrdigitalmarketingindia@gmail.com' }}" \
              --arg subject "🚨 Deploy verification FAILED for $SHORT (v${{ steps.check.outputs.expected_version }})" \
              --arg html "<h2>Deploy verification failed</h2>
                <p><strong>Expected:</strong> ${{ github.sha }} · v${{ steps.check.outputs.expected_version }}</p>
                <ul>
                  <li>Render API: ${{ steps.check.outputs.api_ok == 'true' && '✅ matched' || format('❌ live = {0} (v{1})', steps.check.outputs.api_seen, steps.check.outputs.api_version) }}</li>
                  <li>Vercel Web: ${{ steps.check.outputs.web_ok == 'true' && '✅ matched' || format('❌ live = {0} (v{1})', steps.check.outputs.web_seen, steps.check.outputs.web_version) }}</li>
                </ul>
                <p><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Open the workflow run</a></p>
                <p>Check the Render / Vercel dashboards — the deploy may have failed to build or is still queued.</p>" \
              '{from: $from, to: [$to], subject: $subject, html: $html}')"
