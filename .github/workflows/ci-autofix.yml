name: CI Auto-Fix Report

# Fires after the main CI workflow finishes.
# On failure: builds a structured report from job logs and creates a GitHub Issue.
# On success: closes any open ci-failure issues automatically.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  report-failure:
    name: Capture and report CI failure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    permissions:
      issues: write
      actions: read
      contents: read

    steps:
      - name: Build report and create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const runId    = context.payload.workflow_run.id;
            const headSha  = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;

            // ── collect failed jobs ──────────────────────────────────────────
            const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              run_id: runId,
            });

            const failedJobs = jobsData.jobs.filter(j => j.conclusion === 'failure');

            // ── build report string (no template-literal interpolation across steps) ─
            const lines = [];
            lines.push('## 🔴 CI Failure Report\n');
            lines.push('**Branch:** `' + headBranch + '`');
            lines.push('**Commit:** `' + headSha.slice(0, 8) + '`');
            lines.push('**Run:** https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + runId);
            lines.push('');
            lines.push('### Failed Jobs\n');

            for (const job of failedJobs) {
              lines.push('#### ❌ ' + job.name + '\n');

              const failedSteps = (job.steps || []).filter(s => s.conclusion === 'failure');
              if (failedSteps.length > 0) {
                lines.push('**Failed step(s):**');
                for (const step of failedSteps) {
                  lines.push('- `' + step.name + '`');
                }
                lines.push('');
              }

              try {
                const logsResp = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  job_id: job.id,
                });
                const logText   = (logsResp.data || '').toString();
                const logLines  = logText.split('\n');
                const failLines = logLines.filter(l =>
                  l.includes('FAIL') || l.includes('Error:') ||
                  l.includes('AssertionError') || l.includes('Expected ') ||
                  l.includes('Runner crashed')
                ).slice(0, 40);

                if (failLines.length > 0) {
                  lines.push('**Extracted failures:**');
                  lines.push('```');
                  lines.push(failLines.join('\n'));
                  lines.push('```');
                  lines.push('');
                }
              } catch (err) {
                lines.push('_(Could not fetch logs: ' + err.message + ')_\n');
              }
            }

            lines.push('---');
            lines.push('**Download full logs:** https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + runId);
            lines.push('');
            lines.push('_Auto-generated by CI Auto-Fix Report workflow._');

            const report = lines.join('\n');
            const title  = '🔴 CI Failure — ' + headSha.slice(0, 8) + ' — ' + new Date().toISOString().slice(0, 10);

            // ── upsert GitHub Issue ──────────────────────────────────────────
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              state:  'open',
              labels: 'ci-failure',
            });

            const existing = openIssues.find(i => i.title.includes(headSha.slice(0, 8)));

            if (existing) {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: existing.number,
                body:         '### New failure on re-run\n\n' + report,
              });
              console.log('Updated existing issue #' + existing.number);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title,
                body:   report,
                labels: ['ci-failure', 'bug'],
              });
              console.log('Created issue #' + issue.number + ': ' + issue.html_url);
            }

  close-on-success:
    name: Close stale CI failure issues on green run
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      issues: write

    steps:
      - name: Close open ci-failure issues
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const sha    = context.payload.workflow_run.head_sha;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              state:  'open',
              labels: 'ci-failure',
            });

            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                body:         '✅ CI is green on `' + branch + '` @ `' + sha.slice(0, 8) + '`. Closing automatically.',
              });
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                state:        'closed',
              });
              console.log('Closed issue #' + issue.number);
            }
