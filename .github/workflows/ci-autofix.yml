name: CI Auto-Fix Report

# Fires after the main CI workflow finishes — on failure only.
# Captures full logs, parses the failing test names, and creates a
# GitHub Issue with a structured failure report so the team (or an
# AI coding assistant) can pick it up without manually reading logs.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  report-failure:
    name: Capture and report CI failure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    permissions:
      issues: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts from failed run
        uses: actions/github-script@v7
        id: download-artifacts
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            core.setOutput('run_id', runId);
            core.setOutput('artifact_count', artifacts.data.total_count);
            console.log(`Found ${artifacts.data.total_count} artifact(s) for run ${runId}`);

      - name: Fetch failed job logs summary
        uses: actions/github-script@v7
        id: failure-report
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const headSha = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;

            // Get all jobs for this run
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');

            let report = `## 🔴 CI Failure Report\n\n`;
            report += `**Branch:** \`${headBranch}\`\n`;
            report += `**Commit:** \`${headSha.slice(0, 8)}\`\n`;
            report += `**Run:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}\n\n`;
            report += `### Failed Jobs\n\n`;

            for (const job of failedJobs) {
              report += `#### ❌ ${job.name}\n\n`;

              // Find failed steps
              const failedSteps = job.steps?.filter(s => s.conclusion === 'failure') ?? [];
              if (failedSteps.length > 0) {
                report += `**Failed step(s):**\n`;
                for (const step of failedSteps) {
                  report += `- \`${step.name}\`\n`;
                }
                report += `\n`;
              }

              // Fetch logs for this job
              try {
                const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id,
                });
                // Extract FAIL lines only (keep last 100 lines of context)
                const logText = logs.data?.toString() ?? '';
                const lines = logText.split('\n');
                const failLines = lines.filter(l =>
                  l.includes('❌ FAIL') || l.includes('FAIL ') ||
                  l.includes('Error:') || l.includes('AssertionError') ||
                  l.includes('Expected ') || l.includes('✗') ||
                  l.includes('Runner crashed')
                ).slice(0, 40);

                if (failLines.length > 0) {
                  report += `**Failure details (extracted from logs):**\n\`\`\`\n`;
                  report += failLines.join('\n');
                  report += `\n\`\`\`\n\n`;
                }
              } catch (e) {
                report += `_(Could not fetch logs: ${e.message})_\n\n`;
              }
            }

            report += `---\n`;
            report += `### Artifacts\n`;
            report += `Download full logs: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}\n\n`;
            report += `### Action Required\n`;
            report += `Review the failure details above, fix the failing test or the underlying API bug, `;
            report += `and push a fix to \`${headBranch}\`.\n\n`;
            report += `_Auto-generated by CI Auto-Fix Report workflow._\n`;

            core.setOutput('report', report);
            core.setOutput('head_sha', headSha);
            core.setOutput('run_id', runId);

      - name: Create or update GitHub Issue for this failure
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.failure-report.outputs.report }}`;
            const sha = `${{ steps.failure-report.outputs.head_sha }}`;
            const runId = `${{ steps.failure-report.outputs.run_id }}`;
            const title = `🔴 CI Failure — ${sha.slice(0, 8)} — ${new Date().toISOString().slice(0, 10)}`;

            // Search for an open issue for this commit already
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
            });

            const alreadyOpen = existing.data.find(i => i.title.includes(sha.slice(0, 8)));

            if (alreadyOpen) {
              // Add a comment with the new report
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: alreadyOpen.number,
                body: `### New failure on re-run\n\n${report}`,
              });
              console.log(`Updated existing issue #${alreadyOpen.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: report,
                labels: ['ci-failure', 'bug'],
              });
              console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
            }

  close-on-success:
    name: Close stale CI failure issues on green run
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      issues: write

    steps:
      - name: Close open ci-failure issues for this branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const sha    = context.payload.workflow_run.head_sha;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
            });

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ CI is now green on \`${branch}\` @ \`${sha.slice(0, 8)}\`. Closing automatically.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              console.log(`Closed issue #${issue.number}`);
            }
