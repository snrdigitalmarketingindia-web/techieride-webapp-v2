name: Bump Build Version

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    # Skip if the commit was made by this action itself (avoid infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip version]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for accurate commit count
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: ver
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "version=2.1.0.$COUNT" >> $GITHUB_OUTPUT

      - name: Update package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.ver.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.ver.outputs.version }} [skip version]"
          git push
